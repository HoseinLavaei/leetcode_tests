services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: leetcode
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: mongo
      MONGO_INITDB_DATABASE: leetcode
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  app:
    build: .
    depends_on:
      - db
      - mongo
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db/leetcode
      MONGO_URI: mongodb://root:mongo@mongo:27017/leetcode?authSource=admin
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    command: pytest

volumes:
  postgres_data:
  mongo_data:
  redis_data: